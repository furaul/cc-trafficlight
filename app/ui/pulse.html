<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <style>
    html, body { margin: 0; background: transparent; overflow: hidden; }
    #border {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      box-shadow: inset 0 0 0 6px #ef4444, inset 0 0 80px rgba(239, 68, 68, 0.5);
    }
    #border.fire { animation: firePulse 2.2s ease-out; }
    @keyframes firePulse {
      0% { opacity: 0; }
      12% { opacity: 1; }
      40% { opacity: 0.85; }
      100% { opacity: 0; }
    }
  </style>
</head>
<body>
  <div id="border"></div>
  <script src="pulse.js"></script>
</body>
</html>
